# iOS builds, app store submissions, and Expo publishing steps are currently disabled but will be enabled in the future.

name: test+build+deploy

on:
  workflow_dispatch:
    inputs:
      build_android_dev:
        type: boolean
        description: "Build Android development APK"
        default: true
      build_android_prod_apk:
        type: boolean
        description: "Build Android production APK (.apk)"
        default: false
      build_android_prod_aab:
        type: boolean
        description: "Build Android production bundle (.aab)"
        default: false
      # build_ios_dev:
      #   type: boolean
      #   description: "Build iOS development app"
      #   default: false
      # build_ios_prod:
      #   type: boolean
      #   description: "Build iOS production IPA"
      #   default: false
      # publish_expo:
      #   type: boolean
      #   description: "Publish update to Expo"
      #   default: false
      # publish_stores:
      #   type: boolean
      #   description: "Submit builds to app stores"
      #   default: false
      create_github_release:
        type: boolean
        description: "Create a GitHub release with build artifacts"
        default: false

env:
  EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
  # EXPO_APPLE_ID: ${{ secrets.EXPO_APPLE_ID }}
  # EXPO_APPLE_PASSWORD: ${{ secrets.EXPO_APPLE_PASSWORD }}
  # EXPO_TEAM_ID: ${{ secrets.EXPO_TEAM_ID }}
  # GOOGLE_PLAY_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT }}
  NODE_OPTIONS: --openssl-legacy-provider

jobs:
  check-skip:
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.head_commit.message || '', '[skip ci]') }}
    steps:
      - name: Skip CI check
        run: echo "Proceeding with workflow"

  test:
    needs: check-skip
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup npm cache
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install dependencies
        run: npm ci

      - name: Run expo doctor
        run: npx expo-doctor

      - name: Run type checks
        run: npm run type-check

      - name: Run Linting
        run: npm run lint

      - name: Run tests
        run: npm run test

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup npm cache
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install dependencies
        run: |
          npm ci
          npm install -g eas-cli@latest

      - name: Setup EAS build cache
        uses: actions/cache@v5
        with:
          path: ~/.eas-build-local
          key: ${{ runner.os }}-eas-build-local-${{ hashFiles('**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-eas-build-local-

      - name: Verify EAS CLI installation
        run: |
          echo "EAS CLI version:"
          eas --version

      - name: Fix package.json main entry
        run: |
          # Check if jq is installed, if not install it
          if ! command -v jq &> /dev/null; then
            echo "Installing jq..."
            sudo apt-get update && sudo apt-get install -y jq
          fi

          # Fix the main entry in package.json
          if [ -f ./package.json ]; then
            # Create a backup
            cp package.json package.json.bak
            # Update the package.json
            jq '.main = "node_modules/expo/AppEntry.js"' package.json > package.json.tmp && mv package.json.tmp package.json
            echo "Updated package.json main entry"
            cat package.json | grep "main"
          else
            echo "package.json not found"
            exit 1
          fi

      - name: Update metro.config.js for SVG support
        run: |
          if [ -f ./metro.config.js ]; then
            echo "Creating backup of metro.config.js"
            cp ./metro.config.js ./metro.config.js.backup
            echo "Updating metro.config.js to CommonJS format"
            cat > ./metro.config.js << 'EOFMARKER'
          /* eslint-disable @typescript-eslint/no-var-requires */
          const { getDefaultConfig } = require('expo/metro-config');

          const config = getDefaultConfig(__dirname);

          const { transformer, resolver } = config;

          config.transformer = {
            ...transformer,
            babelTransformerPath: require.resolve('react-native-svg-transformer/expo'),
          };

          config.resolver = {
            ...resolver,
            assetExts: resolver.assetExts.filter(ext => ext !== 'svg'),
            sourceExts: [...resolver.sourceExts, 'svg'],
          };

          module.exports = config;
          EOFMARKER
            echo "metro.config.js updated to CommonJS format"
          else
            echo "metro.config.js not found"
          fi

      - name: Build Development APK
        if: github.event.inputs.build_android_dev == 'true'
        run: |
          # Build with increased memory limit
          export NODE_OPTIONS="--openssl-legacy-provider --max_old_space_size=4096"
          eas build --platform android --profile development --local --non-interactive --output=./app-dev.apk
        env:
          NODE_ENV: development

      - name: Build Production APK
        if: github.event.inputs.build_android_prod_apk == 'true'
        run: |
          export NODE_OPTIONS="--openssl-legacy-provider --max_old_space_size=4096"
          eas build --platform android --profile production-apk --local --non-interactive --output=./app-prod.apk
        env:
          NODE_ENV: production

      - name: Build Production AAB
        if: github.event.inputs.build_android_prod_aab == 'true'
        run: |
          export NODE_OPTIONS="--openssl-legacy-provider --max_old_space_size=4096"
          eas build --platform android --profile production --local --non-interactive --output=./app-prod.aab
        env:
          NODE_ENV: production

      # - name: Build iOS Development
      #   if: github.event.inputs.buildType == 'all' || github.event.inputs.buildType == 'ios-dev'
      #   run: |
      #     export NODE_OPTIONS="--openssl-legacy-provider --max_old_space_size=4096"
      #     eas build --platform ios --profile development --local --non-interactive --output=./app-ios-dev.app
      #   env:
      #     NODE_ENV: development

      # - name: Build iOS Production
      #   if: github.event.inputs.buildType == 'all' || github.event.inputs.buildType == 'ios-prod'
      #   run: |
      #     export NODE_OPTIONS="--openssl-legacy-provider --max_old_space_size=4096"
      #     eas build --platform ios --profile production --local --non-interactive --output=./app-ios-prod.ipa
      #   env:
      #     NODE_ENV: production

      # - name: Publish to Expo
      #   if: github.event.inputs.buildType == 'all' || github.event.inputs.buildType == 'publish-expo'
      #   run: |
      #     eas update --auto
      #   env:
      #     EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      # - name: Submit to Play Store
      #   if: github.event.inputs.buildType == 'all' || github.event.inputs.buildType == 'publish-stores'
      #   run: |
      #     eas submit -p android --path ./app-prod.aab --non-interactive
      #   env:
      #     EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      #     GOOGLE_PLAY_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT }}

      # - name: Submit to App Store
      #   if: github.event.inputs.buildType == 'all' || github.event.inputs.buildType == 'publish-stores'
      #   run: |
      #     eas submit -p ios --path ./app-ios-prod.ipa --non-interactive
      #   env:
      #     EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      #     EXPO_APPLE_ID: ${{ secrets.EXPO_APPLE_ID }}
      #     EXPO_APPLE_PASSWORD: ${{ secrets.EXPO_APPLE_PASSWORD }}
      #     EXPO_TEAM_ID: ${{ secrets.EXPO_TEAM_ID }}

      - name: Generate build information
        id: build-info
        run: |
          VERSION=$(npx expo config --json | jq -r '.expo.version')
          BUILD_NUMBER=$(date +%Y%m%d%H%M)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "build_number=$BUILD_NUMBER" >> $GITHUB_OUTPUT
          # Generate changelog from commit messages since last tag
          if git describe --tags --abbrev=0 > /dev/null 2>&1; then
            LAST_TAG=$(git describe --tags --abbrev=0)
            git log $LAST_TAG..HEAD --pretty=format:"- %s" > changelog.md
          else
            git log --pretty=format:"- %s" -n 10 > changelog.md
          fi

      - name: Collect built artifacts for release
        id: collect-artifacts
        run: |
          FILES=""
          for f in ./app-dev.apk ./app-prod.apk ./app-prod.aab ./app-ios-dev.app ./app-ios-prod.ipa; do
            if [ -f "$f" ]; then
              if [ -z "$FILES" ]; then
                FILES="$f"
              else
                FILES="$FILES"$'\n'"$f"
              fi
            fi
          done
          echo "files<<EOF" >> "$GITHUB_OUTPUT"
          echo "$FILES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Upload build artifacts
        if: ${{ steps.collect-artifacts.outputs.files != '' }}
        uses: actions/upload-artifact@v6
        with:
          name: build-artifacts-${{ steps.build-info.outputs.version }}-${{ steps.build-info.outputs.build_number }}
          path: ${{ steps.collect-artifacts.outputs.files }}

      - name: Create GitHub Release
        if: ${{ steps.collect-artifacts.outputs.files != '' && github.event.inputs.create_github_release == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          name: "Release v${{ steps.build-info.outputs.version }}-${{ steps.build-info.outputs.build_number }}"
          tag_name: "v${{ steps.build-info.outputs.version }}-${{ steps.build-info.outputs.build_number }}"
          files: ${{ steps.collect-artifacts.outputs.files }}
          body_path: changelog.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
